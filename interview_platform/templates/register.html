{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AI Interview Platform</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="bg-light">

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-robot"></i>
            AI Interview Prep
        </a>

        <div>
            <a href="/login/" class="btn btn-light">
                Login
            </a>
        </div>

    </div>
</nav>

<!-- Register Form -->

<div class="container my-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-lg border-0">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <i class="bi bi-person-plus-fill display-3 text-primary"></i>

                        <h2 class="fw-bold mt-3">

                            Create Account

                        </h2>

                        <p class="text-muted">

                            Register to start AI Interview Preparation

                        </p>

                    </div>

                    <form id="registerForm">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">Full Name</label>

                                <input
                                    type="text"
                                    class="form-control"
                                    id="name"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">Email</label>

                                <input
                                    type="email"
                                    class="form-control"
                                    id="email"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Mobile Number

                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    id="mobile"
                                    maxlength="10"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Job Role

                                </label>

                                <select
                                    class="form-select"
                                    id="role">

                                    <option>Python Developer</option>

                                    <option>Java Developer</option>

                                    <option>Frontend Developer</option>

                                    <option>React Developer</option>

                                    <option>Full Stack Developer</option>

                                </select>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Password

                                </label>

                                <input
                                    type="password"
                                    class="form-control"
                                    id="password"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Confirm Password

                                </label>

                                <input
                                    type="password"
                                    class="form-control"
                                    id="confirmPassword"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Skills

                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    id="skills"
                                    placeholder="Python, Django, React">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Experience

                                </label>

                                <select
                                    class="form-select"
                                    id="experience">

                                    <option>Fresher</option>

                                    <option>1 Year</option>

                                    <option>2 Years</option>

                                    <option>3+ Years</option>

                                </select>

                            </div>

                            <div class="col-md-12 mb-3">

                                <label class="form-label">

                                    Upload Resume

                                </label>

                                <input
                                    type="file"
                                    class="form-control"
                                    id="resume">

                            </div>

                        </div>

                        <button
                            class="btn btn-primary w-100 mt-3"
                            type="submit">

                            Create Account

                        </button>

                    </form>

                    <div
                        id="message"
                        class="text-center mt-3">

                    </div>

                    <hr>

                    <div class="text-center">

                        Already have an account?

                        <a href="/login/">

                            Login Here

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

document.getElementById("registerForm").addEventListener("submit",async function(e){

e.preventDefault();

let password=document.getElementById("password").value;

let confirm=document.getElementById("confirmPassword").value;

let message=document.getElementById("message");

if(password!==confirm){

message.innerHTML="<span class='text-danger'>Passwords do not match</span>";

return;

}

const formData=new FormData();

formData.append("name",document.getElementById("name").value);
formData.append("email",document.getElementById("email").value);
formData.append("mobile",document.getElementById("mobile").value);
formData.append("role",document.getElementById("role").value);
formData.append("password",password);
formData.append("skills",document.getElementById("skills").value);
formData.append("experience",document.getElementById("experience").value);

const resume=document.getElementById("resume").files[0];

if(resume){

formData.append("resume",resume);

}

try{

const response=await fetch("http://127.0.0.1:8000/api/users/register/",{

method:"POST",

body:formData

});

const data=await response.json();

if(response.ok){

message.innerHTML="<span class='text-success'>Registration Successful</span>";

setTimeout(()=>{

window.location.href="/login/";

},1500);

}

else{

message.innerHTML="<span class='text-danger'>"+data.message+"</span>";

}

}

catch{

message.innerHTML="<span class='text-danger'>Server Error</span>";

}

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
