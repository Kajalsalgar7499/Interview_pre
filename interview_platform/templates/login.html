{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | AI Interview Platform</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand fw-bold" href="/">

<i class="bi bi-robot"></i>

AI Interview Prep

</a>

</div>

</nav>

<div class="container">

<div class="row justify-content-center mt-5">

<div class="col-lg-5">

<div class="card shadow-lg border-0">

<div class="card-body p-5">

<div class="text-center mb-4">

<i class="bi bi-person-circle display-3 text-primary"></i>

<h2 class="fw-bold mt-3">

Login

</h2>

<p class="text-muted">

Sign in to continue

</p>

</div>

<form id="loginForm">

<div class="mb-3">

<label class="form-label">

Email Address

</label>

<input
type="email"
class="form-control"
id="email"
placeholder="Enter Email"
required>

</div>

<div class="mb-3">

<label class="form-label">

Password

</label>

<div class="input-group">

<input
type="password"
class="form-control"
id="password"
placeholder="Enter Password"
required>

<button
class="btn btn-outline-secondary"
type="button"
onclick="togglePassword()">

<i class="bi bi-eye" id="eyeIcon"></i>

</button>

</div>

</div>

<div class="d-flex justify-content-between mb-3">

<div>

<input type="checkbox">

Remember Me

</div>

<a href="#" class="text-decoration-none">

Forgot Password?

</a>

</div>

<button
class="btn btn-primary w-100"
type="submit">

Login

</button>

</form>

<hr>

<div class="text-center">

Don't have an account?

<a href="/register/">

Register

</a>

</div>

<div
id="message"
class="mt-3 text-center">

</div>

</div>

</div>

</div>

</div>

</div>

<script>

function togglePassword(){

const password=document.getElementById("password");

const eye=document.getElementById("eyeIcon");

if(password.type==="password"){

password.type="text";

eye.className="bi bi-eye-slash";

}

else{

password.type="password";

eye.className="bi bi-eye";

}

}

document.getElementById("loginForm").addEventListener("submit",async function(e){

e.preventDefault();

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

const message=document.getElementById("message");

message.innerHTML="";

try{

const response=await fetch("http://127.0.0.1:8000/api/users/login/",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

email:email,

password:password

})

});

const data=await response.json();

if(response.ok){

localStorage.setItem("token",data.token);

message.innerHTML="<span class='text-success'>Login Successful</span>";

setTimeout(()=>{

window.location.href="/dashboard/";

},1000);

}

else{

message.innerHTML="<span class='text-danger'>"+data.message+"</span>";

}

}

catch(error){

message.innerHTML="<span class='text-danger'>Server Error</span>";

}

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
